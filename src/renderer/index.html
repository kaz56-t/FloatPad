<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>FloatPad</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- タイトルバー -->
    <div id="titlebar">
      <div id="tabs">
        <button class="tab active" data-tab="memo">Memo</button>
        <button class="tab" data-tab="calculator">Calc</button>
        <button class="tab" data-tab="web">Web</button>
      </div>
      <!-- ドラッグ可能な空白領域 -->
      <div id="drag-region"></div>
      <button id="settings-btn" title="設定">⚙</button>
      <button id="close-btn" title="閉じる">✕</button>
    </div>

    <!-- メモパネル -->
    <div id="panel-memo" class="panel active">
      <textarea id="memo-input" placeholder="メモを入力..."></textarea>
      <div id="memo-status">
        <span id="char-count">0 文字</span>
        <span id="save-status"></span>
      </div>
    </div>

    <!-- 電卓パネル -->
    <div id="panel-calculator" class="panel">
      <div id="calc-history"></div>
      <div id="calc-display">
        <div id="calc-expression"></div>
        <div id="calc-result" data-display title="クリックでコピー">0</div>
      </div>
      <div id="calc-buttons">
        <button class="calc-btn func" data-key="AC">AC</button>
        <button class="calc-btn func" data-key="+/-">+/-</button>
        <button class="calc-btn func" data-key="%">%</button>
        <button class="calc-btn operator" data-key="÷">÷</button>

        <button class="calc-btn number" data-key="7">7</button>
        <button class="calc-btn number" data-key="8">8</button>
        <button class="calc-btn number" data-key="9">9</button>
        <button class="calc-btn operator" data-key="×">×</button>

        <button class="calc-btn number" data-key="4">4</button>
        <button class="calc-btn number" data-key="5">5</button>
        <button class="calc-btn number" data-key="6">6</button>
        <button class="calc-btn operator" data-key="-">-</button>

        <button class="calc-btn number" data-key="1">1</button>
        <button class="calc-btn number" data-key="2">2</button>
        <button class="calc-btn number" data-key="3">3</button>
        <button class="calc-btn operator" data-key="+">+</button>

        <button class="calc-btn number wide" data-key="0">0</button>
        <button class="calc-btn number" data-key=".">.</button>
        <button class="calc-btn operator" data-key="=">=</button>
      </div>
    </div>

    <!-- Webビューアパネル -->
    <div id="panel-web" class="panel">
      <div id="web-nav">
        <button id="web-back" title="戻る">◀</button>
        <button id="web-forward" title="進む">▶</button>
        <button id="web-reload" title="更新">⟳</button>
        <input id="web-url" data-url-input type="text" placeholder="URLまたは検索ワードを入力..." />
      </div>
      <div id="web-content">
        <webview id="webview" src="about:blank"></webview>
        <div id="web-spinner" class="hidden">読み込み中...</div>
        <div id="web-error" class="hidden"></div>
      </div>
    </div>

    <!-- 設定パネル -->
    <div id="panel-settings" class="panel">
      <div class="settings-body">
        <section class="settings-section">
          <h2>メモ保存場所</h2>
          <div class="settings-row">
            <input id="memo-dir-input" type="text" readonly placeholder="デフォルト (user-data/)" />
            <button id="memo-dir-browse">…</button>
          </div>
          <p class="settings-hint">memo.txt が保存されるフォルダを選択します</p>
        </section>

        <section class="settings-section">
          <h2>テーマ</h2>
          <div class="theme-selector">
            <button class="theme-btn" data-theme="auto">Auto</button>
            <button class="theme-btn" data-theme="light">Light</button>
            <button class="theme-btn" data-theme="dark">Dark</button>
          </div>
        </section>

        <section class="settings-section">
          <h2>アクセントカラー</h2>
          <div class="accent-swatches">
            <button class="accent-swatch" data-accent="blue"   style="background:#4a9eff" title="ブルー"></button>
            <button class="accent-swatch" data-accent="green"  style="background:#48bb78" title="グリーン"></button>
            <button class="accent-swatch" data-accent="orange" style="background:#ed8936" title="オレンジ"></button>
            <button class="accent-swatch" data-accent="purple" style="background:#9f7aea" title="パープル"></button>
            <button class="accent-swatch" data-accent="pink"   style="background:#fc8181" title="ピンク"></button>
          </div>
        </section>

        <section class="settings-section">
          <h2>ウィンドウ透過度</h2>
          <div class="settings-row">
            <input id="opacity-slider" type="range" min="30" max="100" step="5" value="100" />
            <span id="opacity-value">100%</span>
          </div>
        </section>

        <section class="settings-section">
          <button id="settings-reset" class="settings-reset-btn">デフォルトに戻す</button>
        </section>
      </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
