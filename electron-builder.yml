appId: com.floatpad.app
productName: FloatPad
directories:
  buildResources: resources
  output: dist
files:
  - out/**
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
